<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheLLama - Status</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1e1e1e;
            color: #00ff00;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            border-bottom: 2px solid #00ff00;
            padding-bottom: 10px;
        }
        .summary {
            background: #2b2b2b;
            border: 2px solid #00ff00;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
        }
        .summary-item {
            display: inline-block;
            margin: 10px 20px;
            font-size: 18px;
        }
        .chart-container {
            background: #2b2b2b;
            border: 2px solid #00ff00;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
            height: 400px;
        }
        .time-range-selector {
            text-align: center;
            margin: 10px 0;
        }
        .time-range-btn {
            background: #2b2b2b;
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 8px 16px;
            margin: 0 5px;
            cursor: pointer;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
        .time-range-btn.active {
            background: #00ff00;
            color: #000;
        }
        .backends {
            margin-top: 30px;
        }
        .backend {
            background: #2b2b2b;
            border: 2px solid #00ff00;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .backend.offline {
            border-color: #ff0000;
            color: #ff0000;
        }
        .backend-header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .backend-info {
            margin: 5px 0;
        }
        .strength-bar {
            display: inline-block;
            height: 14px;
            border-radius: 3px;
            vertical-align: middle;
        }
        .strength-label {
            display: inline-block;
            min-width: 80px;
            text-align: center;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }
        .hw-stats {
            display: flex;
            gap: 30px;
            margin: 8px 0;
            flex-wrap: wrap;
        }
        .hw-stat {
            font-size: 14px;
        }
        .hw-stat .label {
            opacity: 0.7;
        }
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 3px;
            font-size: 14px;
            margin-left: 10px;
        }
        .status-online {
            background: #00ff00;
            color: #000;
        }
        .status-offline {
            background: #ff0000;
            color: #fff;
        }
        .status-active {
            background: #ffff00;
            color: #000;
        }
        .refresh-info {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.7;
        }
        a {
            color: #00ff00;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SheLLama - System Status</h1>
        
        <div class="summary">
            <div class="summary-item">Total Queue: <span id="total-queue">-</span></div>
            <div class="summary-item">Active Backends: <span id="active-backends">-</span> / <span id="total-backends">-</span></div>
            <div class="summary-item">Total Requests: <span id="total-requests">-</span></div>
            <div class="summary-item">Total Tokens: <span id="total-tokens">-</span></div>
        </div>

        <div class="time-range-selector">
            <button class="time-range-btn active" onclick="setTimeRange('hour')">Hour</button>
            <button class="time-range-btn" onclick="setTimeRange('day')">Day</button>
            <button class="time-range-btn" onclick="setTimeRange('week')">Week</button>
            <button class="time-range-btn" onclick="setTimeRange('month')">Month</button>
            <button class="time-range-btn" onclick="setTimeRange('year')">Year</button>
        </div>

        <div class="chart-container">
            <canvas id="queueChart"></canvas>
        </div>

        <div class="chart-container">
            <canvas id="ipTokenChart"></canvas>
        </div>

        <div class="backends">
            <h2>Backend Servers</h2>
            <div id="backend-list"></div>
        </div>

        <div class="refresh-info">
            Auto-refreshing every 2 seconds | <a href="/">Back to Main</a>
        </div>
    </div>

    <script>
        const colors = ['#00ff00', '#00ffff', '#ff00ff', '#ffff00', '#ff8800', '#0088ff', '#ff4444', '#44ff44', '#4444ff', '#ff44ff'];
        let timeRange = 'hour';
        const timeRanges = {
            hour: { points: 60, interval: 2000 },
            day: { points: 288, interval: 300000 },
            week: { points: 336, interval: 1800000 },
            month: { points: 360, interval: 7200000 },
            year: { points: 365, interval: 86400000 }
        };
        
        const chartData = {
            labels: [],
            datasets: []
        };
        
        const historicalData = {
            hour: { labels: [], queue: {} },
            day: { labels: [], queue: {} },
            week: { labels: [], queue: {} },
            month: { labels: [], queue: {} },
            year: { labels: [], queue: {} }
        };

        // Per-IP token tracking
        const ipTokenData = {
            labels: [],
            datasets: []
        };
        const ipTokenHistory = {};  // {ip: [{timestamp, cumulative_tokens}]}

        const ctx = document.getElementById('queueChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: chartData,
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { color: '#00ff00' },
                        grid: { color: '#333' }
                    },
                    x: {
                        ticks: { color: '#00ff00', maxTicksLimit: 10 },
                        grid: { color: '#333' }
                    }
                },
                plugins: {
                    legend: {
                        labels: { color: '#00ff00' }
                    },
                    title: {
                        display: true,
                        text: 'Queue Size Over Time',
                        color: '#00ff00',
                        font: { size: 16 }
                    }
                }
            }
        });

        const ipCtx = document.getElementById('ipTokenChart').getContext('2d');
        const ipChart = new Chart(ipCtx, {
            type: 'line',
            data: ipTokenData,
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { color: '#00ff00' },
                        grid: { color: '#333' },
                        title: {
                            display: true,
                            text: 'Tokens',
                            color: '#00ff00'
                        }
                    },
                    x: {
                        ticks: { color: '#00ff00', maxTicksLimit: 10 },
                        grid: { color: '#333' }
                    }
                },
                plugins: {
                    legend: {
                        labels: { color: '#00ff00' }
                    },
                    title: {
                        display: true,
                        text: 'Token Usage  —  🖥 Client IP (solid)  ·  ⚙ Backend Server (dashed)',
                        color: '#00ff00',
                        font: { size: 16 }
                    }
                }
            }
        });
        
        function setTimeRange(range) {
            timeRange = range;
            document.querySelectorAll('.time-range-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase() === range) {
                    btn.classList.add('active');
                }
            });
            
            const data = historicalData[range];
            chartData.labels.splice(0, chartData.labels.length, ...data.labels);
            
            chartData.datasets.length = 0;
            Object.keys(data.queue).forEach((url, idx) => {
                const shortUrl = url.replace(/^https?:\/\//, '').replace(/:\d+$/, '');
                chartData.datasets.push({
                    label: shortUrl,
                    data: [...data.queue[url]],
                    borderColor: colors[idx % colors.length],
                    backgroundColor: colors[idx % colors.length] + '33',
                    tension: 0.4
                });
            });
            
            chart.update('none');
            updateIpTokenChart(range);
        }

        function updateIpTokenChart(range) {
            const now = Date.now();
            const rangeMs = {
                hour: 3600000,
                day: 86400000,
                week: 604800000,
                month: 2592000000,
                year: 31536000000
            };
            const cutoff = (now - rangeMs[range]) / 1000;  // in seconds

            ipTokenData.labels = [];
            ipTokenData.datasets = [];

            // Separate backends and client IPs
            const backendKeys = Object.keys(ipTokenHistory).filter(k => k.startsWith('backend:'));
            const ipKeys = Object.keys(ipTokenHistory).filter(k => !k.startsWith('backend:'));
            const allKeys = [...ipKeys, ...backendKeys];

            allKeys.forEach((key, idx) => {
                const entries = ipTokenHistory[key].filter(e => e.timestamp >= cutoff);
                if (entries.length === 0) return;

                const isBackend = key.startsWith('backend:');
                const label = isBackend ? '⚙ ' + key.replace('backend:', '').replace(/^https?:\/\//, '').replace(/:\d+$/, '') : '🖥 ' + key;

                // Build cumulative token series
                let cumulative = 0;
                const dataPoints = [];
                const labels = [];
                entries.forEach(e => {
                    cumulative += e.tokens;
                    const d = new Date(e.timestamp * 1000);
                    labels.push(d.toLocaleTimeString());
                    dataPoints.push(cumulative);
                });

                // Use the longest label set
                if (labels.length > ipTokenData.labels.length) {
                    ipTokenData.labels = labels;
                }

                ipTokenData.datasets.push({
                    label: label,
                    data: dataPoints,
                    borderColor: colors[idx % colors.length],
                    backgroundColor: colors[idx % colors.length] + '33',
                    borderDash: isBackend ? [6, 3] : [],
                    borderWidth: isBackend ? 3 : 2,
                    tension: 0.4
                });
            });

            ipChart.update('none');
        }

        function fetchIpTokens() {
            fetch('/ip-tokens')
                .then(r => r.json())
                .then(data => {
                    // Replace local cache with server data
                    Object.keys(data).forEach(ip => {
                        ipTokenHistory[ip] = data[ip];
                    });
                    updateIpTokenChart(timeRange);
                })
                .catch(() => {});
        }

        function getStrength(backend) {
            // Compute relative strength from RAM total, max_model, and architecture
            const modelSizes = {
                'qwen2.5-coder:0.5b': 0.5, 'qwen2.5-coder:1.5b': 1.5, 'qwen2.5-coder:3b': 3,
                'qwen2.5-coder:7b': 7, 'qwen2.5-coder:14b': 14, 'qwen2.5-coder:32b': 32,
                'deepseek-coder:1.3b': 1.3, 'deepseek-coder:6.7b': 6.7, 'deepseek-coder:33b': 33,
                'codellama:7b': 7, 'codellama:13b': 13, 'codellama:34b': 34, 'codellama:70b': 70
            };
            const ram = backend.ram_total_gb || 0;
            const maxModelSize = modelSizes[backend.max_model] || 7;
            const archMultiplier = backend.cpu_arch === 'arm64' ? 3.0 : 1.0;
            const score = ((ram / 128) * 50 + (maxModelSize / 70) * 50) * archMultiplier;
            return Math.min(Math.round(score), 100);
        }

        function strengthColor(pct) {
            if (pct >= 70) return '#00ff00';
            if (pct >= 40) return '#ffff00';
            return '#ff8800';
        }

        function strengthLabel(pct) {
            if (pct >= 70) return 'Strong';
            if (pct >= 40) return 'Medium';
            return 'Light';
        }

        function updateStatus() {
            fetch('/queue-status')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('total-queue').textContent = data.queue_size;
                    document.getElementById('active-backends').textContent = data.active_backends;
                    document.getElementById('total-backends').textContent = data.total_backends;
                    document.getElementById('total-requests').textContent = data.total_requests || 0;
                    document.getElementById('total-tokens').textContent = (data.total_tokens || 0).toLocaleString();

                    const now = new Date();
                    const timeLabel = now.toLocaleTimeString();
                    
                    // Update all time ranges
                    Object.keys(historicalData).forEach(range => {
                        const maxPoints = timeRanges[range].points;
                        const rangeData = historicalData[range];
                        
                        rangeData.labels.push(timeLabel);
                        if (rangeData.labels.length > maxPoints) {
                            rangeData.labels.shift();
                        }
                        
                        data.backends.forEach((backend, idx) => {
                            if (!rangeData.queue[backend.url]) {
                                rangeData.queue[backend.url] = [];
                            }
                            rangeData.queue[backend.url].push(backend.queue_size);
                            
                            if (rangeData.queue[backend.url].length > maxPoints) {
                                rangeData.queue[backend.url].shift();
                            }
                        });
                    });
                    
                    // Update current view
                    setTimeRange(timeRange);

                    // Update backend list
                    const backendList = document.getElementById('backend-list');
                    backendList.innerHTML = '';

                    data.backends.forEach(backend => {
                        const div = document.createElement('div');
                        div.className = 'backend' + (backend.status === 'offline' ? ' offline' : '');
                        
                        let statusBadge = backend.status === 'online' ? 
                            '<span class="status-badge status-online">ONLINE</span>' :
                            '<span class="status-badge status-offline">OFFLINE</span>';
                        
                        let activeBadge = backend.active ? 
                            '<span class="status-badge status-active">PROCESSING</span>' : '';

                        let modelInfo = backend.active_model !== 'none' ? 
                            ` | Active Model: ${backend.active_model}` : '';

                        const strength = getStrength(backend);
                        const sColor = strengthColor(strength);
                        const sLabel = strengthLabel(strength);

                        const ramUsed = backend.ram_total_gb - backend.ram_available_gb;
                        const ramPct = backend.ram_total_gb > 0 ? Math.round((ramUsed / backend.ram_total_gb) * 100) : 0;
                        const cpuPct = Math.round(backend.cpu_percent || 0);

                        div.innerHTML = `
                            <div class="backend-header">
                                ${backend.url}
                                ${statusBadge}
                                ${activeBadge}
                            </div>
                            <div class="backend-info">
                                Strength: <span class="strength-label" style="background:${sColor};color:#000;">${sLabel} (${strength}%)</span>
                                <span class="strength-bar" style="width:${strength * 2}px;background:${sColor};"></span>
                            </div>
                            <div class="hw-stats">
                                <div class="hw-stat"><span class="label">CPU:</span> ${cpuPct}% (${backend.cpu_count || '?'}c ${backend.cpu_arch || 'unknown'} ${backend.cpu_freq_mhz ? (backend.cpu_freq_mhz/1000).toFixed(1)+'GHz' : ''})</div>
                                <div class="hw-stat"><span class="label">RAM:</span> ${ramUsed.toFixed(1)} / ${backend.ram_total_gb} GB (${ramPct}%)</div>
                                <div class="hw-stat"><span class="label">Weight:</span> ${backend.weight}</div>
                                <div class="hw-stat"><span class="label">Max Model:</span> ${backend.max_model}</div>
                            </div>
                            <div class="backend-info">Queue Size: ${backend.queue_size}${modelInfo}</div>
                        `;
                        backendList.appendChild(div);
                    });
                })
                .catch(error => {
                    console.error('Error fetching status:', error);
                });
        }

        // Update immediately and then every 2 seconds
        updateStatus();
        fetchIpTokens();
        setInterval(updateStatus, 2000);
        setInterval(fetchIpTokens, 10000);  // Refresh IP token data every 10s
    </script>
</body>
</html>
