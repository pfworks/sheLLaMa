<!DOCTYPE html>
<html>
<head>
    <title>Ansible Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { margin-bottom: 20px; }
        .section { margin-bottom: 20px; }
        label { display: inline-block; margin-bottom: 10px; cursor: pointer; }
        textarea { width: 100%; height: 300px; padding: 10px; font-family: monospace; border: 1px solid #ddd; border-radius: 4px; }
        .buttons { display: flex; gap: 10px; margin-top: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .primary { background: #007bff; color: white; }
        .primary:hover { background: #0056b3; }
        .secondary { background: #6c757d; color: white; }
        .secondary:hover { background: #545b62; }
        #status, #statusExplain, #statusCode, #statusCodeExplain { margin: 10px 0; padding: 10px; border-radius: 4px; display: none; }
        .loading { background: #fff3cd; color: #856404; }
        .loading::after { content: '...'; animation: dots 1.5s steps(4, end) infinite; }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ansible Tools</h1>
        
        <div class="section">
            <label>Model: 
                <select id="modelSelect">
                    <option value="codellama:7b">CodeLlama 7B (Fast, ~4GB RAM)</option>
                    <option value="codellama:13b" selected>CodeLlama 13B (Balanced, ~8GB RAM)</option>
                    <option value="codellama:34b">CodeLlama 34B (Best Quality, ~20GB RAM)</option>
                    <option value="codellama:70b">CodeLlama 70B (Highest Quality, ~40GB RAM)</option>
                    <option value="deepseek-coder:1.3b">DeepSeek Coder 1.3B (Tiny, ~1GB RAM)</option>
                    <option value="deepseek-coder:6.7b">DeepSeek Coder 6.7B (Fast, ~4GB RAM)</option>
                    <option value="deepseek-coder:33b">DeepSeek Coder 33B (Large, ~20GB RAM)</option>
                    <option value="qwen2.5-coder:0.5b">Qwen2.5 Coder 0.5B (Tiny, ~500MB RAM)</option>
                    <option value="qwen2.5-coder:1.5b">Qwen2.5 Coder 1.5B (Tiny, ~1GB RAM)</option>
                    <option value="qwen2.5-coder:3b">Qwen2.5 Coder 3B (Small, ~2GB RAM)</option>
                    <option value="qwen2.5-coder:7b">Qwen2.5 Coder 7B (Balanced, ~4GB RAM)</option>
                    <option value="qwen2.5-coder:14b">Qwen2.5 Coder 14B (Large, ~8GB RAM)</option>
                    <option value="qwen2.5-coder:32b">Qwen2.5 Coder 32B (Very Large, ~20GB RAM)</option>
                </select>
            </label>
        </div>
        
        <div class="section">
            <label>
                <input type="radio" name="service" value="generate" checked onchange="switchService()"> 
                Shell → Ansible
            </label>
            <label style="margin-left: 20px;">
                <input type="radio" name="service" value="explain" onchange="switchService()"> 
                Ansible → Explanation
            </label>
            <label style="margin-left: 20px;">
                <input type="radio" name="service" value="generateCode" onchange="switchService()"> 
                Description → Code
            </label>
            <label style="margin-left: 20px;">
                <input type="radio" name="service" value="explainCode" onchange="switchService()"> 
                Code → Explanation
            </label>
            <label style="margin-left: 20px;">
                <input type="radio" name="service" value="chat" onchange="switchService()"> 
                Chat
            </label>
        </div>

        <div id="generateService">
            <div class="section">
                <h3>Shell Commands</h3>
                <textarea id="commands" placeholder="Paste your shell commands here..."></textarea>
                <div class="buttons">
                    <input type="file" id="fileInput" accept=".txt,.sh" style="display: none;">
                    <button class="secondary" onclick="document.getElementById('fileInput').click()">Upload File</button>
                    <button class="primary" onclick="generate()">Generate Playbook</button>
                    <button class="secondary" onclick="clearAll()">Clear</button>
                </div>
            </div>

            <div id="status"></div>

            <div class="section">
                <h3>Ansible Playbook</h3>
                <textarea id="playbook" readonly placeholder="Generated playbook will appear here..."></textarea>
                <div class="buttons">
                    <button class="secondary" onclick="copyToClipboard('playbook')">Copy</button>
                    <button class="secondary" onclick="download()">Download</button>
                </div>
            </div>
        </div>

        <div id="explainService" style="display: none;">
            <div class="section">
                <h3>Ansible Playbook</h3>
                <textarea id="playbookInput" placeholder="Paste your Ansible playbook here..."></textarea>
                <div class="buttons">
                    <input type="file" id="fileInputExplain" accept=".yml,.yaml" style="display: none;">
                    <button class="secondary" onclick="document.getElementById('fileInputExplain').click()">Upload File</button>
                    <button class="primary" onclick="explain()">Explain Playbook</button>
                    <button class="secondary" onclick="clearAll()">Clear</button>
                </div>
            </div>

            <div id="statusExplain"></div>

            <div class="section">
                <h3>Explanation</h3>
                <textarea id="explanation" readonly placeholder="Explanation will appear here..."></textarea>
                <div class="buttons">
                    <button class="secondary" onclick="copyToClipboard('explanation')">Copy</button>
                </div>
            </div>
        </div>

        <div id="generateCodeService" style="display: none;">
            <div class="section">
                <h3>Code Description</h3>
                <textarea id="description" placeholder="Describe the code you want to generate..."></textarea>
                <div class="buttons">
                    <input type="file" id="fileInputCode" accept=".txt" style="display: none;">
                    <button class="secondary" onclick="document.getElementById('fileInputCode').click()">Upload File</button>
                    <button class="primary" onclick="generateCode()">Generate Code</button>
                    <button class="secondary" onclick="clearAll()">Clear</button>
                </div>
            </div>

            <div id="statusCode"></div>

            <div class="section">
                <h3>Generated Code</h3>
                <textarea id="generatedCode" readonly placeholder="Generated code will appear here..."></textarea>
                <div class="buttons">
                    <button class="secondary" onclick="copyToClipboard('generatedCode')">Copy</button>
                </div>
            </div>
        </div>

        <div id="explainCodeService" style="display: none;">
            <div class="section">
                <h3>Code</h3>
                <textarea id="codeInput" placeholder="Paste your code here..."></textarea>
                <div class="buttons">
                    <input type="file" id="fileInputCodeExplain" accept="*" style="display: none;">
                    <button class="secondary" onclick="document.getElementById('fileInputCodeExplain').click()">Upload File</button>
                    <button class="primary" onclick="explainCode()">Explain Code</button>
                    <button class="secondary" onclick="clearAll()">Clear</button>
                </div>
            </div>

            <div id="statusCodeExplain"></div>

            <div class="section">
                <h3>Explanation</h3>
                <textarea id="codeExplanation" readonly placeholder="Explanation will appear here..."></textarea>
                <div class="buttons">
                    <button class="secondary" onclick="copyToClipboard('codeExplanation')">Copy</button>
                </div>
            </div>
        </div>

        <div id="chatService" style="display: none;">
            <div class="section">
                <h3>Your Message</h3>
                <textarea id="chatInput" placeholder="Ask any question..."></textarea>
                <div class="buttons">
                    <button class="primary" onclick="chat()">Send</button>
                    <button class="secondary" onclick="clearAll()">Clear</button>
                </div>
            </div>

            <div id="statusChat"></div>

            <div class="section">
                <h3>Response</h3>
                <textarea id="chatResponse" readonly placeholder="Response will appear here..."></textarea>
                <div class="buttons">
                    <button class="secondary" onclick="copyToClipboard('chatResponse')">Copy</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('commands').value = e.target.result;
                };
                reader.readAsText(file);
            }
        });

        document.getElementById('fileInputExplain').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('playbookInput').value = e.target.result;
                };
                reader.readAsText(file);
            }
        });

        document.getElementById('fileInputCode').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('description').value = e.target.result;
                };
                reader.readAsText(file);
            }
        });

        document.getElementById('fileInputCodeExplain').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('codeInput').value = e.target.result;
                };
                reader.readAsText(file);
            }
        });

        function switchService() {
            const service = document.querySelector('input[name="service"]:checked').value;
            document.getElementById('generateService').style.display = service === 'generate' ? 'block' : 'none';
            document.getElementById('explainService').style.display = service === 'explain' ? 'block' : 'none';
            document.getElementById('generateCodeService').style.display = service === 'generateCode' ? 'block' : 'none';
            document.getElementById('explainCodeService').style.display = service === 'explainCode' ? 'block' : 'none';
            document.getElementById('chatService').style.display = service === 'chat' ? 'block' : 'none';
        }

        function showStatus(message, type, statusId = 'status') {
            const status = document.getElementById(statusId);
            status.textContent = message;
            status.className = type;
            status.style.display = 'block';
        }

        async function generate() {
            const commands = document.getElementById('commands').value;
            if (!commands.trim()) {
                showStatus('Please enter some shell commands', 'error');
                return;
            }

            // Check queue position
            try {
                const queueResp = await fetch('/queue-status');
                const queueData = await queueResp.json();
                if (queueData.queue_size > 0) {
                    showStatus(`Queue position: #${queueData.queue_size + 1} - Generating playbook`, 'loading');
                } else {
                    showStatus('Generating playbook', 'loading');
                }
            } catch {
                showStatus('Generating playbook', 'loading');
            }
            
            try {
                const model = document.getElementById('modelSelect').value;
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ commands, model })
                });
                
                const data = await response.json();
                document.getElementById('playbook').value = data.playbook;
                let statusMsg = `Generated in ${data.elapsed}s | Tokens: ${data.total_tokens} (prompt: ${data.prompt_tokens}, response: ${data.response_tokens})`;
                if (data.queue_position) {
                    statusMsg += ` | Was #${data.queue_position} in queue`;
                }
                if (data.error) {
                    showStatus(`Warning: ${data.error} | Time: ${data.elapsed}s`, 'error');
                } else {
                    showStatus(statusMsg, 'success');
                }
            } catch (error) {
                showStatus('Error generating playbook: ' + error.message, 'error');
            }
        }

        async function explain() {
            const playbook = document.getElementById('playbookInput').value;
            if (!playbook.trim()) {
                showStatus('Please enter an Ansible playbook', 'error', 'statusExplain');
                return;
            }

            // Check queue position
            try {
                const queueResp = await fetch('/queue-status');
                const queueData = await queueResp.json();
                if (queueData.queue_size > 0) {
                    showStatus(`Queue position: #${queueData.queue_size + 1} - Explaining playbook`, 'loading', 'statusExplain');
                } else {
                    showStatus('Explaining playbook', 'loading', 'statusExplain');
                }
            } catch {
                showStatus('Explaining playbook', 'loading', 'statusExplain');
            }
            
            try {
                const model = document.getElementById('modelSelect').value;
                const response = await fetch('/explain', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ playbook, model })
                });
                
                const data = await response.json();
                document.getElementById('explanation').value = data.explanation;
                let statusMsg = `Explained in ${data.elapsed}s | Tokens: ${data.total_tokens}`;
                if (data.queue_position) {
                    statusMsg += ` | Was #${data.queue_position} in queue`;
                }
                showStatus(statusMsg, 'success', 'statusExplain');
            } catch (error) {
                showStatus('Error explaining playbook: ' + error.message, 'error', 'statusExplain');
            }
        }

        function copyToClipboard(elementId) {
            const element = document.getElementById(elementId);
            element.select();
            document.execCommand('copy');
            let statusId = 'status';
            if (elementId === 'explanation') statusId = 'statusExplain';
            else if (elementId === 'generatedCode') statusId = 'statusCode';
            else if (elementId === 'codeExplanation') statusId = 'statusCodeExplain';
            showStatus('Copied to clipboard!', 'success', statusId);
        }

        async function generateCode() {
            const description = document.getElementById('description').value;
            if (!description.trim()) {
                showStatus('Please enter a code description', 'error', 'statusCode');
                return;
            }

            // Check queue position
            try {
                const queueResp = await fetch('/queue-status');
                const queueData = await queueResp.json();
                if (queueData.queue_size > 0) {
                    showStatus(`Queue position: #${queueData.queue_size + 1} - Generating code`, 'loading', 'statusCode');
                } else {
                    showStatus('Generating code', 'loading', 'statusCode');
                }
            } catch {
                showStatus('Generating code', 'loading', 'statusCode');
            }
            
            try {
                const model = document.getElementById('modelSelect').value;
                const response = await fetch('/generate-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description, model })
                });
                
                const data = await response.json();
                document.getElementById('generatedCode').value = data.code;
                let statusMsg = `Generated in ${data.elapsed}s | Tokens: ${data.total_tokens}`;
                if (data.queue_position) {
                    statusMsg += ` | Was #${data.queue_position} in queue`;
                }
                showStatus(statusMsg, 'success', 'statusCode');
            } catch (error) {
                showStatus('Error generating code: ' + error.message, 'error', 'statusCode');
            }
        }

        async function explainCode() {
            const code = document.getElementById('codeInput').value;
            if (!code.trim()) {
                showStatus('Please enter some code', 'error', 'statusCodeExplain');
                return;
            }

            // Check queue position
            try {
                const queueResp = await fetch('/queue-status');
                const queueData = await queueResp.json();
                if (queueData.queue_size > 0) {
                    showStatus(`Queue position: #${queueData.queue_size + 1} - Explaining code`, 'loading', 'statusCodeExplain');
                } else {
                    showStatus('Explaining code', 'loading', 'statusCodeExplain');
                }
            } catch {
                showStatus('Explaining code', 'loading', 'statusCodeExplain');
            }
            
            try {
                const model = document.getElementById('modelSelect').value;
                const response = await fetch('/explain-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, model })
                });
                
                const data = await response.json();
                document.getElementById('codeExplanation').value = data.explanation;
                let statusMsg = `Explained in ${data.elapsed}s | Tokens: ${data.total_tokens}`;
                if (data.queue_position) {
                    statusMsg += ` | Was #${data.queue_position} in queue`;
                }
                showStatus(statusMsg, 'success', 'statusCodeExplain');
            } catch (error) {
                showStatus('Error explaining code: ' + error.message, 'error', 'statusCodeExplain');
            }
        }

        async function chat() {
            const message = document.getElementById('chatInput').value;
            if (!message.trim()) {
                showStatus('Please enter a message', 'error', 'statusChat');
                return;
            }

            // Check queue position
            try {
                const queueResp = await fetch('/queue-status');
                const queueData = await queueResp.json();
                if (queueData.queue_size > 0) {
                    showStatus(`Queue position: #${queueData.queue_size + 1} - Processing`, 'loading', 'statusChat');
                } else {
                    showStatus('Processing', 'loading', 'statusChat');
                }
            } catch {
                showStatus('Processing', 'loading', 'statusChat');
            }
            
            try {
                const model = document.getElementById('modelSelect').value;
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, model })
                });
                
                const data = await response.json();
                document.getElementById('chatResponse').value = data.response;
                let statusMsg = `Responded in ${data.elapsed}s | Tokens: ${data.total_tokens}`;
                if (data.queue_position) {
                    statusMsg += ` | Was #${data.queue_position} in queue`;
                }
                showStatus(statusMsg, 'success', 'statusChat');
            } catch (error) {
                showStatus('Error: ' + error.message, 'error', 'statusChat');
            }
        }

        function download() {
            const playbook = document.getElementById('playbook').value;
            if (!playbook) {
                showStatus('No playbook to download', 'error');
                return;
            }
            
            const blob = new Blob([playbook], { type: 'text/yaml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'playbook.yml';
            a.click();
            URL.revokeObjectURL(url);
            showStatus('Downloaded playbook.yml', 'success');
        }

        function clearAll() {
            const service = document.querySelector('input[name="service"]:checked').value;
            if (service === 'generate') {
                document.getElementById('commands').value = '';
                document.getElementById('playbook').value = '';
                document.getElementById('status').style.display = 'none';
            } else if (service === 'explain') {
                document.getElementById('playbookInput').value = '';
                document.getElementById('explanation').value = '';
                document.getElementById('statusExplain').style.display = 'none';
            } else if (service === 'generateCode') {
                document.getElementById('description').value = '';
                document.getElementById('generatedCode').value = '';
                document.getElementById('statusCode').style.display = 'none';
            } else {
                document.getElementById('codeInput').value = '';
                document.getElementById('codeExplanation').value = '';
                document.getElementById('statusCodeExplain').style.display = 'none';
            }
        }
    </script>
</body>
</html>
